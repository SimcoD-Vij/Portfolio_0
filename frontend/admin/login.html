<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans flex items-center justify-center">

<div class="w-full max-w-sm px-6">
  <div class="text-center mb-10">
    <a href="/" class="text-xl font-semibold text-white">portfolio<span class="text-indigo-400">.</span></a>
    <p class="text-gray-400 text-sm mt-2">Admin access only</p>
  </div>

  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
    <h1 class="text-lg font-semibold mb-6">Sign in</h1>
    <div id="error-msg" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs text-gray-400 mb-1.5">Username</label>
        <input id="username" type="text" autocomplete="username"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
          placeholder="admin">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1.5">Password</label>
        <input id="password" type="password" autocomplete="current-password"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors"
          placeholder="••••••••">
      </div>
      <button id="login-btn" onclick="doLogin()"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-xl text-sm transition-colors mt-2">
        Sign in
      </button>
    </div>
  </div>

  <p class="text-center mt-6 text-xs text-gray-600">Default: admin / admin123 — change in docker-compose.yml</p>
</div>

<script src="/js/api.js"></script>
<script>
// If already logged in, redirect
if (isLoggedIn()) window.location.href = '/admin/dashboard.html';

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  if (!username || !password) { showErr('Enter username and password'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.classList.add('hidden');

  try {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });
    setToken(data.token);
    window.location.href = '/admin/dashboard.html';
  } catch (e) {
    showErr('Invalid credentials');
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function showErr(msg) {
  const err = document.getElementById('error-msg');
  err.textContent = msg;
  err.classList.remove('hidden');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
