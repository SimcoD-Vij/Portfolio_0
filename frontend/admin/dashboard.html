<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/main.css">
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans">

<!-- Sidebar -->
<aside class="fixed left-0 top-0 h-full w-56 bg-gray-900 border-r border-gray-800 flex flex-col z-20">
  <div class="p-6 border-b border-gray-800">
    <a href="/" class="text-base font-semibold text-white">portfolio<span class="text-indigo-400">.</span></a>
    <p class="text-xs text-gray-500 mt-1">Admin panel</p>
  </div>
  <nav class="flex-1 p-4 space-y-1">
    <a href="/admin/dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-xl bg-indigo-600/20 text-indigo-400 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      Dashboard
    </a>
    <a href="/admin/editor.html" class="flex items-center gap-3 px-3 py-2 rounded-xl text-gray-400 hover:text-white hover:bg-gray-800 text-sm transition-all">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      New project
    </a>
    <a href="/" target="_blank" class="flex items-center gap-3 px-3 py-2 rounded-xl text-gray-400 hover:text-white hover:bg-gray-800 text-sm transition-all">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
      View site
    </a>
  </nav>
  <div class="p-4 border-t border-gray-800">
    <button onclick="logout()" class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-xl text-gray-400 hover:text-red-400 hover:bg-red-500/10 text-sm transition-all">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Logout
    </button>
  </div>
</aside>

<!-- Main -->
<div class="ml-56 p-8">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold">Dashboard</h1>
      <p class="text-gray-400 text-sm mt-1">Manage all your projects</p>
    </div>
    <a href="/admin/editor.html" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-sm font-medium transition-colors">+ New project</a>
  </div>

  <!-- Stats -->
  <div id="stats" class="grid grid-cols-3 gap-4 mb-8"></div>

  <!-- Projects table -->
  <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-800 flex items-center justify-between">
      <h2 class="font-medium">All projects</h2>
      <input id="search" type="text" placeholder="Search…" oninput="filterTable()"
        class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 w-48">
    </div>
    <div id="table-wrap">
      <div class="p-8 text-center text-gray-500 animate-pulse">Loading…</div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/themes.js"></script>
<script>
let projects = [];

async function init() {
  await requireAuth();
  loadStats();
  loadProjects();
}

async function loadStats() {
  try {
    const s = await api('/admin/stats');
    document.getElementById('stats').innerHTML = `
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <p class="text-xs text-gray-400 mb-1">Total projects</p>
        <p class="text-3xl font-bold text-white">${s.total}</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <p class="text-xs text-gray-400 mb-1">Published</p>
        <p class="text-3xl font-bold text-green-400">${s.published}</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <p class="text-xs text-gray-400 mb-1">Drafts</p>
        <p class="text-3xl font-bold text-amber-400">${s.drafts}</p>
      </div>`;
  } catch {}
}

async function loadProjects() {
  try {
    projects = await api('/admin/projects');
    renderTable(projects);
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = `<p class="p-8 text-center text-red-400">Failed to load: ${e.message}</p>`;
  }
}

function renderTable(list) {
  if (!list.length) {
    document.getElementById('table-wrap').innerHTML = `<div class="p-12 text-center text-gray-500">
      <p class="text-4xl mb-3">📝</p>
      <p>No projects yet.</p>
      <a href="/admin/editor.html" class="mt-3 inline-block text-indigo-400 hover:underline text-sm">Create your first project</a>
    </div>`;
    return;
  }

  const rows = list.map(p => `
    <tr class="border-t border-gray-800 hover:bg-gray-800/50 transition-colors">
      <td class="px-6 py-4">
        <p class="font-medium text-sm text-white">${escHtml(p.title)}</p>
        <p class="text-xs text-gray-500 mt-0.5">/blog/${escHtml(p.slug)}</p>
      </td>
      <td class="px-4 py-4">${domainBadge(p.domain)}</td>
      <td class="px-4 py-4">
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${
          p.status === 'published'
            ? 'bg-green-500/15 text-green-400 border border-green-500/30'
            : 'bg-amber-500/15 text-amber-400 border border-amber-500/30'
        }">
          <span class="w-1.5 h-1.5 rounded-full ${p.status === 'published' ? 'bg-green-400' : 'bg-amber-400'}"></span>
          ${p.status}
        </span>
      </td>
      <td class="px-4 py-4 text-xs text-gray-500">${formatDate(p.created_at)}</td>
      <td class="px-6 py-4">
        <div class="flex items-center gap-2">
          <button onclick="togglePublish(${p.id}, '${p.status}')"
            class="px-3 py-1.5 text-xs rounded-lg border transition-all ${
              p.status === 'published'
                ? 'border-amber-600/50 text-amber-400 hover:bg-amber-500/10'
                : 'border-green-600/50 text-green-400 hover:bg-green-500/10'
            }">
            ${p.status === 'published' ? 'Unpublish' : 'Publish'}
          </button>
          <a href="/admin/editor.html?id=${p.id}"
            class="px-3 py-1.5 text-xs rounded-lg border border-gray-700 text-gray-400 hover:text-white hover:border-gray-500 transition-all">Edit</a>
          <button onclick="deleteProject(${p.id}, '${escHtml(p.title)}')"
            class="px-3 py-1.5 text-xs rounded-lg border border-gray-700 text-gray-400 hover:text-red-400 hover:border-red-500/50 transition-all">Delete</button>
        </div>
      </td>
    </tr>`).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table class="w-full">
      <thead>
        <tr class="text-xs text-gray-500 uppercase tracking-wider">
          <th class="text-left px-6 py-3">Title</th>
          <th class="text-left px-4 py-3">Domain</th>
          <th class="text-left px-4 py-3">Status</th>
          <th class="text-left px-4 py-3">Created</th>
          <th class="text-left px-6 py-3">Actions</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  renderTable(q ? projects.filter(p =>
    p.title.toLowerCase().includes(q) || p.domain.toLowerCase().includes(q) || p.slug.toLowerCase().includes(q)
  ) : projects);
}

async function togglePublish(id, currentStatus) {
  try {
    const res = await api(`/admin/projects/${id}/publish`, { method: 'PUT' });
    toast(`Project ${res.status === 'published' ? 'published ✓' : 'moved to draft'}`);
    loadProjects(); loadStats();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteProject(id, title) {
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  try {
    await api(`/admin/projects/${id}`, { method: 'DELETE' });
    toast('Project deleted');
    loadProjects(); loadStats();
  } catch(e) { toast(e.message, 'error'); }
}

function logout() {
  clearToken();
  window.location.href = '/admin/login.html';
}

init();
</script>
</body>
</html>
